<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>countdown</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="slideshow"></div>
    <div class="overlay">
      <div class="overlay-inner">
        <h1 id="headline">Death of the 20s</h1>
        <p id="subheadline"></p>
        <div id="countdown">
          <div class="time-box">
            <span class="value" id="days">--</span>
            <span class="label">Days</span>
          </div>
          <div class="time-box">
            <span class="value" id="hours">--</span>
            <span class="label">Hours</span>
          </div>
          <div class="time-box">
            <span class="value" id="minutes">--</span>
            <span class="label">Minutes</span>
          </div>
          <div class="time-box">
            <span class="value" id="seconds">--</span>
            <span class="label">Seconds</span>
          </div>
        </div>
        <p id="after-message" class="hidden">
          Your 30s have begun. Long live the new era.
        </p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
